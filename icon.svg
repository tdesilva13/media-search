<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Search circle -->
  <circle cx="220" cy="220" r="90" fill="none" stroke="#818cf8" stroke-width="24" stroke-linecap="round"/>
  <!-- Search handle -->
  <line x1="288" y1="288" x2="370" y2="370" stroke="#818cf8" stroke-width="24" stroke-linecap="round"/>
  <!-- Play triangle inside search -->
  <polygon points="200,175 200,265 270,220" fill="#818cf8"/>
</svg>
